content:
  - name: calendar
    label: Events Calendar
    type: file
    path: data/events.json
    format: json
    list: true
    fields:
      - name: title
        label: Title
        type: string
        required: true
        description: "Название ивента"
      - name: date
        label: Date
        type: date
        required: true
        description: "Дата проведения"
        options:
          format: "yyyy-MM-dd"
      - name: category
        label: Category
        type: select
        required: true
        description: "Категория ивента"
        options:
          values: ["Турнир", "Открытый день", "Игродень", "Хобби-день", "Мастер-класс"]
      - name: location
        label: Location
        type: string
        required: true
        description: "Место проведения ивента"
      - name: organizer
        label: Organizer
        type: string
        required: true
        description: "Организатор ивента"
      - name: url
        label: URL
        type: string
        description: "Заполняется только после создания страницы ивента!"
