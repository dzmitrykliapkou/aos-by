content:
  - name: calendar
    label: Календарь Ивентов
    type: file
    path: data/events.json
    format: json
    list: true
    fields:
      - name: title
        label: Title
        type: string
        required: true
        description: "Название ивента"
      - name: date
        label: Date
        type: date
        required: true
        description: "Дата проведения"
        options:
          format: "yyyy-MM-dd"
      - name: category
        label: Category
        type: select
        required: true
        description: "Категория ивента"
        options:
          values: ["Турнир", "Открытый день", "Игродень", "Хобби-день", "Мастер-класс"]
      - name: location
        label: Location
        type: string
        required: true
        description: "Место проведения ивента"
      - name: organizer
        label: Organizer
        type: string
        required: true
        description: "Организатор ивента"
      - name: url
        label: URL
        type: string
        description: "Заполняется только после создания страницы ивента!"
  - name: Articles
    label: Статьи и Новости
    type: group
    items:
      - name: text
        label: Тексты статей
        type: collection
        path: articles
        subfolders: true
        fields:
          - name: title
            type: string
          - name: body
            type: rich-text
      - name: metadata
        label: Метаданные статей
        type: file
        path: data/articles.json
        format: json
        list: true
        fields:
          - name: slug
            type: string
            label: Идентификатор статьи (slug)
            description: "Используется в адресе страницы. Только латинские буквы в нижнем регистре, цифры и дефисы."
            options:
              regex: ^[a-z0-9]+(?:-[a-z0-9]+)*$
              message: "Некорректный формат slug. Используйте только латинские буквы, цифры и дефисы."
          - name: title
            label: Заголовок статьи
            description: "Название статьи, которое будет отображаться на странице и в списках материалов."
            type: string
            required: true
          - name: excerpt
            type: string
            label: Краткое описание
            description: "Небольшое описание статьи для превью и списка материалов."
          - name: tags
            label: Теги
            description: "Выберите категории, которые описывают статью. Можно выбрать несколько. Для попадания статьи в раздел \"новости\" у нее должен быть тег \"новость\"."
            type: select
            options:
              multiple: true
              values: ["новость", "гайд", "новичкам", "лор", "правила", "перевод", "репорт", "фото"]
              min: 1
            required: true
          - name: date
            type: date
            label: Дата публикации
            description: "Дата, которая будет отображаться как дата выхода статьи."
            options:
              format: "yyyy-MM-dd"
            required: true
          - name: author
            type: string
            label: Автор
            description: "Имя автора или название команды, разместившей материал."
            required: true
          - name: mdFile
            type: file
            label: Файл статьи (Markdown)
            description: "Путь к файлу с текстом статьи в формате Markdown. Например: articles/news/my-article.md"
            required: true