content:
  - name: calendar
    label: Events Calendar
    type: file
    path: data/events.json
    format: json
    list: true
    operations:
      delete: false
    fields:
      - name: title
        label: Title
        type: string
        required: true
        description: "Название ивента"
      - name: date
        label: Date
        type: date
        required: true
        description: "Дата проведения"
        options:
          format: "yyyy-MM-dd"
          min: "2026-07-21"
      - name: category
        label: Category
        type: string
        required: true
        description: "Категория ивента (с большой буквы). Например, \"Турнир\", \"Открытый день\". Для турнира указывать обязательно"
        pattern: 
          regex: "^[А-ЯЁ][а-яё]+$"
          message: "Используйте кириллицу и начинайте с заглавной буквы"
      - name: location
        label: Location
        type: string
        required: true
        description: "Место проведения ивента"
      - name: organizer
        label: Organizer
        type: string
        required: true
        description: "Организатор ивента"
      - name: url
        label: URL
        type: string
        description: "Заполняется только после создания страницы ивента!"
